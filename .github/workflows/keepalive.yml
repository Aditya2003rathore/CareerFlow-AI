name: keep-alive
on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes — under Render's 15-min sleep threshold
  workflow_dispatch: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          # Render free services sleep after 15 min. Trigger keep-alive ping.
          # Replace URL with your deployed Render app URL in production.
          curl -sf http://localhost:8000/api/health || echo "Local backend offline or placeholder"
      - name: Ping Supabase health
        run: |
          # Prevents Supabase free tier projects from pausing after 7 days
          curl -sf "https://YOUR_PROJECT.supabase.co/rest/v1/health_check?select=id" -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" || echo "Supabase endpoint offline or placeholder"
