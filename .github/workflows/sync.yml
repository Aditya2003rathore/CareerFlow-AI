name: sync-jobs
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch: {}
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync endpoint
        run: |
          # Triggers FastAPI backend sync route securely with shared bearer token
          # Replace with your deployed Render app URL in production.
          curl -sf -X POST http://localhost:8000/api/v1/jobs/sync -H "Authorization: Bearer ${{ secrets.SYNC_TOKEN }}" || echo "Sync endpoint offline or placeholder"
